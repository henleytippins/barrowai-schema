<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barrow-AI — AEO Schema Builder</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;width:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f9;color:#0f1c2e}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-thumb{background:#c8d5e8;border-radius:4px}
  textarea{font-family:inherit}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-anim{animation:fadeUp .3s ease forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const BLUE="#3fa0d8", BLUE_DARK="#2887be", BLUE_DIM="rgba(63,160,216,0.10)", BLUE_MID="#cce8f6", GREEN="#27ae7a", MONO="'Courier New',monospace";

const SYS=`You are an AEO specialist at Barrow-AI LLC interviewing a business owner to build JSON-LD schema markup. Ask ONE short conversational question at a time. Briefly acknowledge each answer (1 sentence), then ask the next question. Cover: business name and type, location or service area, hours of operation, contact info (phone, email, website URL), services or products, pricing, team or founding story, and common FAQs. After 6-8 exchanges with enough info, output EXACTLY this format:

INTERVIEW_COMPLETE
SCHEMA_JSON_START
{ your complete JSON-LD object here }
SCHEMA_JSON_END

The JSON must have @context "https://schema.org", the most specific @type available (e.g. Restaurant, LegalService, MedicalBusiness, etc.), and all relevant properties including nested OpeningHoursSpecification, PostalAddress, FAQPage mainEntity, etc. Be comprehensive and production-ready. Start by warmly greeting them, mention Barrow-AI, and ask for their business name and what they do.`;

function NodeIcon({size=18,color="white"}){
  return <svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="3" stroke={color} strokeWidth="1.5" fill="none"/>
    <circle cx="10" cy="3" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <circle cx="17" cy="7" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <circle cx="17" cy="13" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <circle cx="10" cy="17" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <circle cx="3" cy="13" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <circle cx="3" cy="7" r="1.2" stroke={color} strokeWidth="1.2" fill="none"/>
    <line x1="10" y1="6.5" x2="10" y2="4.2" stroke={color} strokeWidth="1"/>
    <line x1="12.8" y1="8.2" x2="15.8" y2="7.8" stroke={color} strokeWidth="1"/>
    <line x1="12.8" y1="11.8" x2="15.8" y2="12.2" stroke={color} strokeWidth="1"/>
    <line x1="10" y1="13.5" x2="10" y2="15.8" stroke={color} strokeWidth="1"/>
    <line x1="7.2" y1="11.8" x2="4.2" y2="12.2" stroke={color} strokeWidth="1"/>
    <line x1="7.2" y1="8.2" x2="4.2" y2="7.8" stroke={color} strokeWidth="1"/>
  </svg>;
}

function TypingDots(){
  return <div style={{display:"flex",gap:5,padding:"11px 15px",background:"#fff",border:"0.5px solid #e2e8f2",borderRadius:"3px 10px 10px 10px",width:"fit-content",boxShadow:"0 1px 3px rgba(15,28,46,.06)"}}>
    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#8fa3be",animation:`bounce 1.2s ease infinite ${i*0.2}s`}}/>)}
  </div>;
}

function highlight(json){
  return json.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{
      let c="#b07c19";
      if(/^"/.test(m)) c=/:$/.test(m)?"#1d6fb5":"#1a7a4a";
      else if(/true|false/.test(m)) c="#c0392b";
      else if(/null/.test(m)) c="#8fa3be";
      return `<span style="color:${c}">${m}</span>`;
    });
}

function App(){
  const [msgs,setMsgs]=useState([]);
  const [conv,setConv]=useState([]);
  const [schema,setSchema]=useState(null);
  const [tab,setTab]=useState("preview");
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const [progress,setProgress]=useState(0);
  const [done,setDone]=useState(false);
  const [copied,setCopied]=useState("");
  const msgsRef=useRef(null);
  const convRef=useRef([]);
  const startedRef=useRef(false);

  useEffect(()=>{convRef.current=conv;},[conv]);
  useEffect(()=>{if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;},[msgs,loading]);
  useEffect(()=>{if(!startedRef.current){startedRef.current=true;callAI(null,[]);}},[]);

  async function callAI(userText,currentConv){
    setLoading(true);
    let msgs2=[...(currentConv!==undefined?currentConv:convRef.current)];
    if(userText) msgs2.push({role:"user",content:userText});
    if(!msgs2.length) msgs2=[{role:"user",content:"Start the interview now."}];
    try{
      const res=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:1500,system:SYS,messages:msgs2})
      });
      const data=await res.json();
      setLoading(false);
      if(data.error){addMsg("ai","Error: "+data.error.message);return;}
      const txt=data.content[0].text;
      const newConv=userText?[...msgs2,{role:"assistant",content:txt}]:[{role:"assistant",content:txt}];
      if(txt.includes("INTERVIEW_COMPLETE")){
        const before=txt.split("INTERVIEW_COMPLETE")[0].trim();
        if(before) addMsg("ai",before);
        const m=txt.match(/SCHEMA_JSON_START\s*([\s\S]*?)\s*SCHEMA_JSON_END/);
        if(m){
          try{
            const s=JSON.parse(m[1].trim());
            setSchema(s);
            addMsg("ai","✓ Your schema is ready! Check the panel on the right — preview, copy the code, view your AEO score, or export.");
            setConv(newConv);convRef.current=newConv;
            setProgress(6);setDone(true);
          }catch(e){addMsg("ai","Schema generated but had a formatting issue. Click Refresh to retry.");}
        }
      } else {
        addMsg("ai",txt);
        setConv(newConv);convRef.current=newConv;
        setProgress(p=>Math.min(p+1,5));
      }
    }catch(e){
      setLoading(false);
      addMsg("ai","Network error: "+e.message);
    }
  }

  function addMsg(role,text){setMsgs(prev=>[...prev,{role,text,id:Date.now()+Math.random()}]);}

  function send(){
    const t=input.trim();
    if(!t||loading||done) return;
    addMsg("user",t);setInput("");
    callAI(t);
  }

  function regen(){
    if(!schema||loading) return;
    setSchema(null);setTab("preview");setDone(false);
    const rc=[...convRef.current,{role:"user",content:"Please regenerate the complete JSON-LD schema from everything discussed. Output INTERVIEW_COMPLETE then the full schema."}];
    setConv(rc);convRef.current=rc;
    callAI(null,rc);
  }

  function resetAll(){
    setMsgs([]);setConv([]);convRef.current=[];
    setSchema(null);setTab("preview");setInput("");
    setProgress(0);setDone(false);startedRef.current=false;
    setTimeout(()=>{startedRef.current=true;callAI(null,[]);},100);
  }

  function copyText(text,key){
    navigator.clipboard.writeText(text).then(()=>{setCopied(key);setTimeout(()=>setCopied(""),2000);});
  }

  function downloadJSON(){
    const blob=new Blob([JSON.stringify(schema,null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=(schema.name||"business").replace(/\s+/g,"-").toLowerCase()+"-schema.json";
    a.click();
  }

  function copyWP(){
    const escaped=JSON.stringify(schema).replace(/'/g,"\\'");
    const php=`<?php\nfunction barrowai_schema() {\n    $schema = '${escaped}';\n    echo '<script type="application/ld+json">' . $schema . '<\\/script>';\n}\nadd_action( 'wp_head', 'barrowai_schema' );`;
    copyText(php,"wp");
  }

  const jsonStr=schema?JSON.stringify(schema,null,2):"";
  const scriptTag=schema?`<script type="application/ld+json">\n${jsonStr}\n</`+`script>`:"";

  const dlBtn={background:BLUE,border:"none",borderRadius:7,padding:"6px 14px",fontSize:11,color:"#fff",fontWeight:600,cursor:"pointer",fontFamily:MONO,whiteSpace:"nowrap"};
  const cpBtn=(k)=>({fontSize:10,background:"#fff",border:`0.5px solid ${copied===k?BLUE:"#c8d5e8"}`,borderRadius:5,color:copied===k?BLUE:"#4a5f7a",padding:"3px 8px",cursor:"pointer",fontFamily:MONO});
  const tabStyle=(active)=>({fontSize:10,padding:"9px 0",marginRight:16,color:active?BLUE:"#8fa3be",cursor:"pointer",borderBottom:`2px solid ${active?BLUE:"transparent"}`,borderTop:"none",borderLeft:"none",borderRight:"none",background:"none",fontFamily:MONO,fontWeight:600,textTransform:"uppercase",letterSpacing:".6px"});

  function renderPreview(){
    if(!schema) return null;
    const sc=schema;
    const cards=[{i:"🏢",t:sc["@type"]||"Business",n:sc.name||"Your Business",sub:(sc.description||"").substring(0,68)+((sc.description||"").length>68?"...":"")}];
    if(sc.address){const a=typeof sc.address==="object"?[sc.address.streetAddress,sc.address.addressLocality,sc.address.addressRegion].filter(Boolean).join(", "):sc.address;cards.push({i:"📍",t:"Address",n:a,sub:sc.telephone||""});}
    if(sc.url) cards.push({i:"🌐",t:"Website",n:sc.url,sub:sc.email||""});
    if(sc.openingHoursSpecification?.length) cards.push({i:"🕐",t:"Hours",n:sc.openingHoursSpecification.length+" time slot(s)",sub:""});
    const items=sc.hasOfferCatalog?.itemListElement||sc.makesOffer||[];
    if(items.length) cards.push({i:"📋",t:"Services",n:items.length+" listed",sub:items.slice(0,3).map(x=>x.name||x).join(" · ")});
    const faq=sc.mainEntity||[];
    if(faq.length) cards.push({i:"❓",t:"FAQ",n:faq.length+" question(s)",sub:(faq[0]?.name||"").substring(0,55)});
    return cards.map((c,i)=>(
      <div key={i} style={{background:"#fff",border:"0.5px solid #e2e8f2",borderRadius:10,padding:"11px 13px",display:"flex",alignItems:"flex-start",gap:10,marginBottom:8,boxShadow:"0 1px 3px rgba(15,28,46,.04)"}}>
        <div style={{width:28,height:28,background:BLUE_DIM,border:`0.5px solid ${BLUE_MID}`,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{c.i}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:10,color:BLUE_DARK,fontFamily:MONO,marginBottom:2,fontWeight:700,textTransform:"uppercase",letterSpacing:".3px"}}>{c.t}</div>
          <div style={{fontSize:13,fontWeight:600,color:"#0f1c2e",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.n}</div>
          {c.sub&&<div style={{fontSize:10,color:"#8fa3be",fontFamily:MONO,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:2}}>{c.sub}</div>}
        </div>
        <div style={{color:GREEN,fontSize:14,flexShrink:0,fontWeight:700}}>✓</div>
      </div>
    ));
  }

  function renderValidate(){
    if(!schema) return null;
    const sc=schema;
    const checks=[
      ["@context is schema.org",sc["@context"]==="https://schema.org"||sc["@context"]==="http://schema.org"],
      ["@type is defined",!!sc["@type"]],["Business name present",!!sc.name],
      ["URL or sameAs provided",!!(sc.url||sc.sameAs)],
      ["Contact info included",!!(sc.telephone||sc.email||sc.contactPoint)],
      ["Address or service area",!!(sc.address||sc.geo||sc.areaServed)],
      ["Description provided",!!sc.description],
      ["Opening hours specified",!!(sc.openingHoursSpecification||sc.openingHours)],
      ["Services or products listed",!!(sc.hasOfferCatalog||sc.makesOffer)],
      ["Valid JSON structure",true],
    ];
    const passed=checks.filter(c=>c[1]).length;
    const score=Math.round(passed/checks.length*100);
    const scoreColor=score>=80?GREEN:score>=60?"#d4870a":"#e05252";
    return <>
      <div style={{background:"#f4f7fb",border:"0.5px solid #e2e8f2",borderRadius:12,padding:20,marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:10,color:"#8fa3be",fontFamily:MONO,textTransform:"uppercase",letterSpacing:".8px",marginBottom:8}}>AEO Score</div>
        <div style={{fontSize:52,fontWeight:200,lineHeight:1,color:scoreColor,letterSpacing:"-2px"}}>{score}</div>
        <div style={{fontSize:11,color:"#8fa3be",fontFamily:MONO,marginTop:4}}>{passed} of {checks.length} checks passed</div>
      </div>
      {checks.map(([label,ok],i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",borderRadius:8,fontSize:12.5,marginBottom:6,background:ok?"rgba(39,174,122,0.07)":"rgba(224,82,82,0.05)",border:`0.5px solid ${ok?"rgba(39,174,122,.2)":"rgba(224,82,82,.18)"}`}}>
          <div style={{width:7,height:7,borderRadius:"50%",flexShrink:0,background:ok?GREEN:"#e05252"}}/>
          <span>{label}</span>
        </div>
      ))}
    </>;
  }

  const emptyState=(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",textAlign:"center",gap:10,padding:30}}>
      <div style={{width:52,height:52,background:BLUE_DIM,border:`0.5px solid ${BLUE_MID}`,borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:6}}>
        <NodeIcon size={26} color={BLUE}/>
      </div>
      <div style={{fontSize:14,fontWeight:600,color:"#4a5f7a"}}>Schema will appear here</div>
      <div style={{fontSize:12,color:"#8fa3be",lineHeight:1.55,maxWidth:190,fontFamily:MONO}}>Complete the AI interview to generate your JSON-LD schema</div>
    </div>
  );

  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* Header */}
      <div style={{padding:"12px 20px",borderBottom:"0.5px solid #e2e8f2",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",boxShadow:"0 1px 4px rgba(15,28,46,.06)",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}>
          <div style={{width:34,height:34,background:BLUE,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 2px 8px rgba(63,160,216,.3)`}}>
            <NodeIcon size={18} color="white"/>
          </div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#0f1c2e",letterSpacing:".3px"}}>BARROW-AI LLC</div>
            <div style={{fontSize:10,color:"#8fa3be",fontFamily:MONO}}>AEO Schema Builder</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:7,background:"#f4f7fb",border:"0.5px solid #e2e8f2",borderRadius:20,padding:"5px 12px"}}>
            <span style={{fontSize:10,color:"#8fa3be",fontFamily:MONO}}>Progress</span>
            <div style={{display:"flex",gap:5}}>
              {[0,1,2,3,4,5].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",transition:"all .3s",background:i<progress?BLUE:i===progress?"#4a5f7a":"#c8d5e8",boxShadow:i<progress?`0 0 0 2px ${BLUE_MID}`:""}}/>)}
            </div>
          </div>
          <span style={{fontSize:10,padding:"4px 10px",borderRadius:20,fontFamily:MONO,fontWeight:700,background:done?"rgba(39,174,122,0.12)":BLUE_DIM,color:done?GREEN:BLUE_DARK,border:`0.5px solid ${done?"rgba(39,174,122,.3)":BLUE_MID}`}}>
            {done?"Schema Ready":"Interviewing"}
          </span>
          <button onClick={resetAll} style={{background:"#f4f7fb",border:"0.5px solid #e2e8f2",borderRadius:7,padding:"5px 11px",fontSize:10,color:"#4a5f7a",cursor:"pointer",fontFamily:MONO,fontWeight:600}}>↺ New Interview</button>
        </div>
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        {/* Chat */}
        <div style={{flex:1,display:"flex",flexDirection:"column",background:"#f4f7fb"}}>
          <div ref={msgsRef} style={{flex:1,overflowY:"auto",padding:"24px 28px",display:"flex",flexDirection:"column",gap:16}}>
            {msgs.map(m=>(
              <div key={m.id} className="msg-anim" style={{display:"flex",gap:12,flexDirection:m.role==="user"?"row-reverse":"row"}}>
                <div style={{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:MONO,flexShrink:0,background:m.role==="ai"?BLUE:"#fff",border:m.role==="ai"?"none":"0.5px solid #c8d5e8",color:m.role==="ai"?"#fff":"#4a5f7a",boxShadow:m.role==="ai"?`0 2px 6px rgba(63,160,216,.25)`:"0 1px 3px rgba(15,28,46,.06)"}}>
                  {m.role==="ai"?<NodeIcon size={14} color="white"/>:"You"}
                </div>
                <div style={{maxWidth:560,display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start"}}>
                  <div style={{fontSize:10,color:"#8fa3be",marginBottom:5,fontFamily:MONO,textAlign:m.role==="user"?"right":"left"}}>{m.role==="ai"?"Barrow-AI":"You"}</div>
                  <div style={{padding:"12px 16px",borderRadius:m.role==="ai"?"3px 12px 12px 12px":"12px 3px 12px 12px",fontSize:14,lineHeight:1.65,background:m.role==="ai"?"#fff":BLUE,border:m.role==="ai"?"0.5px solid #e2e8f2":"none",color:m.role==="ai"?"#0f1c2e":"#fff",boxShadow:m.role==="ai"?"0 1px 4px rgba(15,28,46,.06)":`0 2px 8px rgba(63,160,216,.25)`}}>
                    {m.text.split("\n").map((line,i,arr)=><span key={i}>{line}{i<arr.length-1&&<br/>}</span>)}
                  </div>
                </div>
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",gap:12}}>
                <div style={{width:30,height:30,borderRadius:8,background:BLUE,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 2px 6px rgba(63,160,216,.25)`}}>
                  <NodeIcon size={14} color="white"/>
                </div>
                <div style={{paddingTop:4}}><TypingDots/></div>
              </div>
            )}
          </div>
          <div style={{padding:"14px 24px 18px",background:"#fff",borderTop:"0.5px solid #e2e8f2",flexShrink:0}}>
            <div style={{display:"flex",gap:10,alignItems:"flex-end",border:`1.5px solid ${input&&!done?"#c8d5e8":"#e2e8f2"}`,borderRadius:10,padding:"10px 12px",background:"#fff"}}>
              <textarea
                value={input}
                onChange={e=>{setInput(e.target.value);e.target.style.height="auto";e.target.style.height=Math.min(e.target.scrollHeight,110)+"px";}}
                onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
                disabled={loading||done}
                placeholder={done?"Interview complete — your schema is ready":"Tell me about your business..."}
                rows={1}
                style={{flex:1,background:"none",border:"none",outline:"none",color:"#0f1c2e",fontFamily:"inherit",fontSize:14,lineHeight:1.5,resize:"none",maxHeight:110,minHeight:22,opacity:done?.5:1}}
              />
              <button onClick={send} disabled={loading||done||!input.trim()} style={{background:BLUE,border:"none",borderRadius:8,width:34,height:34,cursor:(loading||done||!input.trim())?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",flexShrink:0,opacity:(loading||done||!input.trim())?.35:1,boxShadow:`0 2px 6px rgba(63,160,216,.3)`}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
                </svg>
              </button>
            </div>
            <div style={{fontSize:10,color:"#8fa3be",marginTop:7,textAlign:"center",fontFamily:MONO}}>Enter to send · Shift+Enter for new line</div>
          </div>
        </div>

        {/* Schema panel */}
        <div style={{width:340,flexShrink:0,display:"flex",flexDirection:"column",background:"#fff",borderLeft:"0.5px solid #e2e8f2"}}>
          <div style={{padding:"12px 16px",borderBottom:"0.5px solid #e2e8f2",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#f4f7fb",flexShrink:0}}>
            <span style={{fontSize:11,color:"#4a5f7a",fontFamily:MONO,textTransform:"uppercase",letterSpacing:".8px",fontWeight:700}}>Generated Schema</span>
            <button onClick={regen} disabled={!schema||loading} style={{background:"#fff",border:"0.5px solid #c8d5e8",borderRadius:7,padding:"5px 11px",fontSize:10,color:"#4a5f7a",cursor:schema&&!loading?"pointer":"not-allowed",fontFamily:MONO,fontWeight:600,opacity:schema&&!loading?1:.4}}>↻ Refresh</button>
          </div>
          <div style={{display:"flex",borderBottom:"0.5px solid #e2e8f2",padding:"0 16px",background:"#f4f7fb",flexShrink:0}}>
            {["preview","code","validate","export"].map(t=><button key={t} onClick={()=>setTab(t)} style={tabStyle(tab===t)}>{t}</button>)}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"14px 16px"}}>
            {!schema?emptyState
              :tab==="preview"?renderPreview()
              :tab==="validate"?renderValidate()
              :tab==="code"?(
                <>
                  {[{label:"Script tag — paste into <head>",content:scriptTag,key:"script"},{label:"Raw JSON-LD",content:jsonStr,key:"json"}].map(({label,content,key})=>(
                    <div key={key} style={{background:"#f8fafc",border:"0.5px solid #e2e8f2",borderRadius:10,overflow:"hidden",marginBottom:14}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 13px",borderBottom:"0.5px solid #e2e8f2",background:"#f0f4f9"}}>
                        <span style={{fontSize:10,color:"#8fa3be",fontFamily:MONO,textTransform:"uppercase",letterSpacing:".5px"}}>{label}</span>
                        <button onClick={()=>copyText(content,key)} style={cpBtn(key)}>{copied===key?"Copied!":"Copy"}</button>
                      </div>
                      <pre style={{padding:13,fontFamily:MONO,fontSize:11,lineHeight:1.75,color:"#0f1c2e",overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:240}}
                        dangerouslySetInnerHTML={{__html:key==="script"?`<span style="color:#8fa3be">&lt;script type="application/ld+json"&gt;</span>\n${highlight(jsonStr)}\n<span style="color:#8fa3be">&lt;/script&gt;</span>`:highlight(content)}}/>
                    </div>
                  ))}
                </>
              ):(
                <>
                  {[
                    {label:"JSON-LD script tag",sub:"Paste into HTML <head>",hi:false,action:()=>copyText(scriptTag,"ex1"),btnLabel:copied==="ex1"?"Copied!":"Copy",key:"ex1"},
                    {label:"schema.json",sub:"Downloadable JSON file",hi:false,action:downloadJSON,btnLabel:"Download",key:"dl"},
                    {label:"WordPress PHP",sub:"Paste into functions.php",hi:false,action:copyWP,btnLabel:copied==="wp"?"Copied!":"Copy PHP",key:"wp"},
                    {label:"Google Rich Results",sub:"Validate with Google ↗",hi:true,action:()=>window.open("https://search.google.com/test/rich-results","_blank"),btnLabel:"Open ↗",key:"goog"},
                  ].map(({label,sub,hi,action,btnLabel,key})=>(
                    <div key={key} style={{background:hi?"rgba(63,160,216,0.07)":"#f4f7fb",border:`0.5px solid ${hi?BLUE_MID:"#e2e8f2"}`,borderRadius:10,padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:8}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:600,marginBottom:2,color:hi?BLUE_DARK:"#0f1c2e"}}>{label}</div>
                        <div style={{fontSize:10,color:hi?BLUE_DARK:"#8fa3be",fontFamily:MONO,opacity:hi?.75:1}}>{sub}</div>
                      </div>
                      <button onClick={action} style={dlBtn}>{btnLabel}</button>
                    </div>
                  ))}
                </>
              )
            }
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
