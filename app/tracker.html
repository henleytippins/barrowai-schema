
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barrow-AI — AEO Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --sidebar: #ffffff; --panel: #ffffff; --panel2: #f7f8fa;
      --border: #e4e7ec; --border2: #d0d5dd; --text: #0f1621; --text2: #4b5563; --text3: #9aa5b4;
      --blue: #3b82c4; --blue-light: #eff6ff; --blue-mid: #dbeafe; --blue-dark: #1e5fa0;
      --green: #16a34a; --red: #dc2626; --amber: #d97706;
      --mono: 'DM Mono', monospace; --sans: 'Inter', sans-serif;
      --radius: 8px; --radius-lg: 12px;
    }
    html, body { height: 100%; font-family: var(--sans); background: var(--bg); color: var(--text); }
    .app { display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; min-width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
    .sidebar-logo { padding: 18px 16px 14px; border-bottom: 1px solid var(--border); }
    .sidebar-logo a { text-decoration: none; }
    .sidebar-logo-name { font-size: 12px; font-weight: 600; letter-spacing: .08em; color: var(--text); text-transform: uppercase; }
    .sidebar-logo-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .sidebar-section { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); padding: 14px 16px 5px; }
    .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border: none; background: transparent; width: 100%; text-align: left; font-family: var(--sans); transition: all .12s; text-decoration: none; }
    .sidebar-item:hover { background: var(--bg); color: var(--text); }
    .sidebar-item.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
    .sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
    .sidebar-clients { padding: 0 8px; }
    .sidebar-client-btn { display: block; width: 100%; text-align: left; padding: 5px 8px; border-radius: 6px; border: none; background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all .12s; }
    .sidebar-client-btn:hover, .sidebar-client-btn.active { background: var(--blue-light); color: var(--blue); }
    .sidebar-client-btn.active { font-weight: 500; }
    .sidebar-bottom { margin-top: auto; padding: 12px 16px; border-top: 1px solid var(--border); }
    .sidebar-plan { background: var(--blue-light); border-radius: var(--radius); padding: 10px 12px; }
    .sidebar-plan-label { font-size: 11px; font-weight: 600; color: var(--blue); margin-bottom: 2px; }
    .sidebar-plan-email { font-size: 11px; color: var(--text3); font-family: var(--mono); }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
    .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .topbar-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .topbar-sub { font-size: 12px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .topbar-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }
    .tbtn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--panel); color: var(--text2); cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all .12s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .tbtn:hover { background: var(--bg); color: var(--text); }
    .tbtn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
    .tbtn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }
    .content { flex: 1; overflow-y: auto; padding: 24px; }
    .panel-content { display: none; }
    .panel-content.active { display: block; }
    .pbox { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; margin-bottom: 12px; }
    .sec-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin: 0 0 12px; }
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .metric { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .metric-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .metric-val { font-size: 22px; font-weight: 600; color: var(--text); font-family: var(--mono); }
    .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .metric-sub.up { color: var(--green); }
    .metric-sub.down { color: var(--red); }
    .client-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .cpill { font-size: 12px; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all .12s; }
    .cpill:hover { border-color: var(--blue); color: var(--blue); }
    .cpill.active { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
    .two { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 600px) { .two { grid-template-columns: 1fr; } }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .lbl { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
    .inp { padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: #fff; color: var(--text); font-size: 13px; font-family: var(--sans); width: 100%; transition: border-color .12s; }
    .inp:focus { outline: none; border-color: var(--blue); }
    .inp::placeholder { color: var(--text3); }
    .inp-hint { font-size: 10px; color: var(--text3); font-family: var(--mono); }
    .btn { width: 100%; padding: .65rem; border-radius: var(--radius); border: 1px solid var(--blue); background: var(--blue); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--sans); transition: all .12s; }
    .btn:hover:not(:disabled) { background: var(--blue-dark); border-color: var(--blue-dark); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.ghost { background: #fff; color: var(--text2); border-color: var(--border2); }
    .btn.ghost:hover:not(:disabled) { background: var(--bg); color: var(--text); }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .abtn { flex: 1; padding: .5rem 8px; border-radius: var(--radius); border: 1px solid var(--border2); background: #fff; color: var(--text2); font-size: 12px; cursor: pointer; font-family: var(--sans); font-weight: 500; transition: all .12s; }
    .abtn:hover { background: var(--bg); color: var(--text); }
    .abtn.primary { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
    .abtn.primary:hover { background: var(--blue-mid); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 500; }
    .bc { background: #dcfce7; color: #15803d; }
    .bm { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
    .br { background: var(--blue-light); color: var(--blue); }
    .kw { font-size: 11px; padding: 2px 8px; border-radius: 100px; border: 1px solid; }
    .kf { border-color: #86efac; color: #15803d; background: #dcfce7; }
    .km { border-color: var(--border); color: var(--text3); }
    .kw-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .snippet { font-size: 11px; color: var(--text3); background: var(--panel2); border-radius: var(--radius); padding: 6px 10px; margin-top: 7px; font-family: var(--mono); border-left: 2px solid var(--blue-mid); line-height: 1.5; }
    .bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .bar-label { font-size: 12px; color: var(--text2); width: 120px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-bg { flex: 1; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; }
    .bar-pct { font-size: 11px; font-family: var(--mono); color: var(--text3); width: 30px; text-align: right; flex-shrink: 0; }
    .hist-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .hist-row:last-child { border-bottom: none; }
    .ritem { border-bottom: 1px solid var(--border); padding: 10px 0; }
    .ritem:last-child { border-bottom: none; padding-bottom: 0; }
    .rhead { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .rsrc { font-size: 10px; padding: 2px 7px; border-radius: 100px; font-weight: 600; }
    .gb { background: #dbeafe; color: #1d4ed8; }
    .yb { background: #fee2e2; color: #b91c1c; }
    .rstars { font-size: 12px; color: var(--amber); }
    .rtext { font-size: 12px; color: var(--text2); line-height: 1.6; }
    .hl { background: var(--blue-mid); color: var(--blue-dark); border-radius: 3px; padding: 0 3px; }
    .qitem { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .qinp { flex: 1; padding: 7px 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: #fff; color: var(--text); font-size: 13px; font-family: var(--sans); }
    .qinp:focus { outline: none; border-color: var(--blue); }
    .rmbtn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .rmbtn:hover { background: #fee2e2; color: var(--red); border-color: #fca5a5; }
    .addbtn { font-size: 12px; background: transparent; border: 1px dashed var(--border2); border-radius: var(--radius); padding: 6px 10px; cursor: pointer; font-family: var(--sans); color: var(--text3); width: 100%; margin-bottom: 10px; transition: all .12s; }
    .addbtn:hover { background: var(--bg); color: var(--text2); }
    .toggle-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-info { flex: 1; }
    .toggle-name { font-size: 13px; color: var(--text); font-weight: 500; }
    .toggle-desc { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .tog { width: 34px; height: 18px; border-radius: 9px; border: 1px solid var(--border2); background: var(--border); cursor: pointer; position: relative; flex-shrink: 0; transition: all .15s; }
    .tog.on { background: var(--blue); border-color: var(--blue); }
    .tog-k { position: absolute; top: 2px; left: 2px; width: 12px; height: 12px; border-radius: 50%; background: #fff; transition: left .15s; }
    .tog.on .tog-k { left: 18px; }
    .code-wrap { position: relative; margin-top: 8px; }
    .code-box { display: block; width: 100%; background: var(--panel2); border-radius: var(--radius); border: 1px solid var(--border); padding: .875rem; font-family: var(--mono); font-size: 11px; color: #1e40af; line-height: 1.7; white-space: pre; overflow-x: auto; max-height: 280px; overflow-y: auto; resize: none; }
    .copy-btn { position: absolute; top: 8px; right: 8px; font-size: 11px; padding: 3px 10px; border-radius: var(--radius); border: 1px solid var(--border2); background: #fff; color: var(--text2); cursor: pointer; font-family: var(--sans); font-weight: 500; }
    .copy-btn:hover { background: var(--bg); }
    .stabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
    .stab { font-size: 11px; font-weight: 500; letter-spacing: .04em; padding: 7px 14px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-family: var(--sans); border-bottom: 2px solid transparent; margin-bottom: -1px; text-transform: uppercase; transition: color .12s; }
    .stab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .empty { text-align: center; padding: 3rem 1rem; color: var(--text3); font-size: 13px; }
    .prog-hd { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .prog-bg { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
    .prog-fill { height: 100%; border-radius: 2px; background: var(--blue); transition: width .4s ease; }
    .summary-grid { background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; text-align: center; margin-top: 12px; }
    .sum-val { font-size: 22px; font-weight: 600; font-family: var(--mono); color: var(--blue); }
    .sum-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }
    .imp-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .imp-item:last-child { border-bottom: none; }
    .imp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--blue); flex-shrink: 0; margin-top: 5px; }
    .imp-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1px; }
    .imp-desc { font-size: 11px; color: var(--text3); }
    .phrase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    @media (max-width: 480px) { .phrase-grid { grid-template-columns: 1fr; } }
    .phrase-card { background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
    .phrase-cat { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
    .phrase-item { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 5px; }
    .phrase-text { font-size: 12px; color: var(--text); font-style: italic; }
    .mini-bar-bg { width: 44px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; flex-shrink: 0; }
    .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--blue); }
    .pcount { font-size: 11px; font-family: var(--mono); color: var(--text3); width: 18px; text-align: right; }
    .result-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; }
    .result-icon { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
    .ri-cited { background: #dcfce7; color: #15803d; }
    .ri-miss { background: var(--panel2); color: var(--text3); }
    .ri-run { background: var(--blue-light); color: var(--blue); }
    .thinking { display: flex; align-items: center; gap: 10px; padding: .75rem 12px; background: var(--panel2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; color: var(--text3); margin-top: 10px; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .chart-wrap { position: relative; width: 100%; height: 160px; margin-top: 10px; }
    .settings-client { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <a href="https://barrow-ai.com/">
        <div class="sidebar-logo-name">BARROW-AI LLC</div>
        <div class="sidebar-logo-sub">AEO Platform</div>
      </a>
    </div>
    <div class="sidebar-section">Tools</div>
    <a href="https://barrow-ai.com/app/" class="sidebar-item">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      Schema Builder
    </a>
    <a href="https://barrow-ai.com/app/tracker.html" class="sidebar-item active">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 4v4l3 2"/></svg>
      AEO Tracker
    </a>
    <div class="sidebar-section" style="margin-top:8px;">Views</div>
    <button class="sidebar-item active" onclick="nav('dashboard',this)" data-panel="dashboard">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
      Dashboard
    </button>
    <button class="sidebar-item" onclick="nav('reviews',this)" data-panel="reviews">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 1l1.8 3.6L14 5.3l-3 2.9.7 4.1L8 10.4l-3.7 1.9.7-4.1-3-2.9 4.2-.7z"/></svg>
      Reviews
    </button>
    <button class="sidebar-item" onclick="nav('scan',this)" data-panel="scan">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3"/></svg>
      AEO Scan
    </button>
    <button class="sidebar-item" onclick="nav('schema',this)" data-panel="schema">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      Schema Gen
    </button>
    <div class="sidebar-section" style="margin-top:8px;">Clients</div>
    <div class="sidebar-clients" id="sidebarClients"></div>
    <div class="sidebar-bottom">
      <div class="sidebar-plan">
        <div class="sidebar-plan-label">Agency Plan</div>
        <div class="sidebar-plan-email">henley@barrow-ai.com</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
        <div class="topbar-sub" id="topbarSub">AI visibility tracking</div>
      </div>
      <div class="topbar-right">
        <span class="topbar-meta" id="lastScanLabel"></span>
        <button class="tbtn" onclick="nav('settings',document.querySelector('[data-panel=settings]'))">Settings</button>
        <button class="tbtn primary" onclick="nav('scan',document.querySelector('[data-panel=scan]'))">↺ Run scan</button>
        <a href="https://barrow-ai.com/app/" class="tbtn">New schema</a>
      </div>
    </div>
    <div class="content">
      <div id="p-dashboard" class="panel-content active"></div>
      <div id="p-reviews" class="panel-content"></div>
      <div id="p-scan" class="panel-content"></div>
      <div id="p-schema" class="panel-content"></div>
      <div id="p-settings" class="panel-content"></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SK='barrow_v4';
let DB={clients:{},scans:{},schemas:{},reviews:{},apiKeys:{}};
let AC=null;
let qInputs=['Best [cuisine] restaurant [city]','Romantic dinner spots near [location]','Top [cuisine] dining [city]','Best pasta in [city]'];
let schToggles={restaurant:true,faqpage:true,localbusiness:true,menu:false,breadcrumb:false};
let tChart=null;
const TITLES={dashboard:['Dashboard','AI visibility tracking'],reviews:['Review Intelligence','Google + Yelp phrase extraction'],scan:['AEO Scan','Live AI citation tracking'],schema:['Schema Generator','Review-enriched JSON-LD'],settings:['Settings','Manage clients and data']};

// Storage: uses localStorage for standalone deployment
const store={
  get:async(k)=>{try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch(e){return null;}},
  set:async(k,v)=>{try{localStorage.setItem(k,v);return{value:v};}catch(e){return null;}}
};

async function load(){
  try{const r=await store.get(SK);if(r&&r.value)DB=JSON.parse(r.value);}catch(e){}
  if(!Object.keys(DB.clients).length){
    DB.clients['Filomena']={name:'Filomena',location:'Georgetown, Washington DC',keywords:'Filomena, Italian, pasta, romantic dining, Georgetown, DC, wine list',cuisine:'Italian'};
    DB.clients['Ambar']={name:'Ambar',location:'Capitol Hill, Washington DC',keywords:'Ambar, Balkan, mezze, brunch, Capitol Hill, DC',cuisine:'Balkan'};
    AC='Filomena';await save();
  } else {AC=Object.keys(DB.clients)[0];}
  renderSidebarClients();renderPanel('dashboard');updateLastScan();
}
async function save(){try{await store.set(SK,JSON.stringify(DB));}catch(e){}}

function nav(id,btn){
  document.querySelectorAll('[data-panel]').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.panel-content').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  const t=TITLES[id]||['',''];
  document.getElementById('topbarTitle').textContent=t[0];
  document.getElementById('topbarSub').textContent=t[1];
  renderPanel(id);
}
function renderPanel(id){
  if(id==='dashboard')renderDash();
  else if(id==='reviews')renderRev();
  else if(id==='scan')renderScan();
  else if(id==='schema')renderSchema();
  else if(id==='settings')renderSettings();
}
function updateLastScan(){
  const s=DB.scans[AC]||[];
  const ll=document.getElementById('lastScanLabel');

  const demo=data.isDemo?`<div style="font-size:11px;color:var(--text3);background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 12px;margin-bottom:10px;font-family:var(--mono);">Demo mode — Filomena mock data</div>`:'';

oin('')}</div><p class="sec-title">Raw reviews <span style="font-weight:400;color:var(--text3);">(highlighted = top AI phrases)</span></p><div class="pbox" style="margin-bottom:12px;">${revHtml}</div><div class="btn-row"><button class="abtn primary" onclick="nav('schema',document.querySelector('[data-panel=schema]'))">Pipe into schema gen ↗</button></div>`;
}
async function analyzeRevs(name,reviews){
  const txt=reviews.map(r=>`[${r.source} ${r.stars}★] ${r.text}`).join('\n');
  const prompt=`AEO analyst for "${name}". Extract structured review insights for AI citation optimization.\n\nReviews:\n${txt}\n\nReturn ONLY JSON:\n{"positive_phrases":[{"phrase":"exact phrase","count":number}],"negative_themes":[{"theme":"issue","suggestion":"schema fix"}],"themes":[{"theme":"name"}],"schema_keywords":["kw"],"faq_suggestions":[{"question":"user question","answer":"answer mentioning ${name}"}],"overall_sentiment":"positive|mixed|negative"}\n\n6 positive_phrases (multi-word, exact from reviews, counts 1-8), up to 3 negatives, 5 themes, 10 schema_keywords, 4 FAQs.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const d=await res.json();if(d.error)throw new Error(d.error.message);
  let t=d.content.map(b=>b.text||'').join('').trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
  return JSON.parse(t);
}
async function fetchGoogle(name,loc,key){
  const s=await fetch(`https://maps.googleapis.com/maps/api/place/findplacefromtext/json?input=${encodeURIComponent(name+' '+loc)}&inputtype=textquery&fields=place_id,rating,user_ratings_total&key=${key}`);
  const sd=await s.json();if(!sd.candidates?.length)throw new Error('Google: place not found');
  const dr=await fetch(`https://maps.googleapis.com/maps/api/place/details/json?place_id=${sd.candidates[0].place_id}&fields=reviews,rating,user_ratings_total&key=${key}`);
  const dd=await dr.json();const r=dd.result;
  return{rating:r.rating,total:r.user_ratings_total,reviews:(r.reviews||[]).map(rv=>({stars:rv.rating,text:rv.text,source:'google'}))};
}
async function fetchYelp(name,loc,key){
  const s=await fetch(`https://api.yelp.com/v3/businesses/search?term=${encodeURIComponent(name)}&location=${encodeURIComponent(loc)}&limit=1`,{headers:{'Authorization':'Bearer '+key}});
  const sd=await s.json();if(!sd.businesses?.length)throw new Error('Yelp: not found');
  const biz=sd.businesses[0];
  const rr=await fetch(`https://api.yelp.com/v3/businesses/${biz.id}/reviews?limit=20`,{headers:{'Authorization':'Bearer '+key}});
  const rd=await rr.json();
  return{rating:biz.rating,total:biz.review_count,reviews:(rd.reviews||[]).map(rv=>({stars:rv.rating,text:rv.text,source:'yelp'}))};
}

  document.getElementById('progTitle').textContent='Scan complete — saved to dashboard';

  renderSidebarClients();updateLastScan();
}
async function doQ(name,loc,kws,query){
  const prompt=`You are an AI assistant asked: "${query}"\n\nAnswer genuinely as a helpful assistant. Recommend real restaurants, be specific.\n\nAfter your answer, output this JSON on the last line (raw JSON, no markdown):\n{"cited":true_or_false,"keywords_found":["kw1"],"snippet":"first 120 chars of answer"}\n\ncited=true only if you mentioned "${name}" (case-insensitive). keywords_found: only from ${JSON.stringify(kws)}.`;
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  const d=await res.json();if(d.error)throw new Error(d.error.message);
  const text=d.content.map(b=>b.text||'').join('');
  const lines=text.trim().split('\n');let jl='';
  for(let i=lines.length-1;i>=0;i--){const l=lines[i].trim();if(l.startsWith('{')&&l.endsWith('}')){jl=l;break;}}
  let p={cited:false,keywords_found:[],snippet:''};if(jl)try{p=JSON.parse(jl);}catch(e){}
  if(!p.snippet)p.snippet=text.replace(jl,'').trim().slice(0,120);
  return{query,...p};
}

function renderSchema(){
  const el=document.getElementById('p-schema');

  const missed=lat.results.filter(r=>!r.cited).map(r=>r.query);

  const mkw=(lat.keywords||[]).filter(k=>!fkw.some(f=>f.includes(k.toLowerCase())||k.toLowerCase().includes(f)));

  const allRevs=[...(rev?.google?.reviews||[]),...(rev?.yelp?.reviews||[])];

ge schema',localbusiness:'LocalBusiness schema',menu:'Menu schema',breadcrumb:'BreadcrumbList'};const descs={restaurant:'Core identity, cuisine, hours, address',faqpage:'Targets missed queries as Q&A pairs',localbusiness:'Geo, maps, neighborhood context',menu:'Dishes, prices, descriptions',breadcrumb:'Site structure for AI navigation'};const on=schToggles[k];return`<div class="toggle-row"><div class="toggle-info"><div class="toggle-name">${labels[k]}</div><div class="toggle-desc">${descs[k]}</div></div><div class="tog ${on?'on':''}" onclick="togSch('${k}',this)"><div class="tog-k"></div></div></div>`;}).join('')}</div><button class="btn" id="genBtn" onclick="genSchema()">Generate JSON-LD${revPhrases.length>0?' (review-enriched)':''}</button><div id="schemaOut" style="margin-top:12px;">${saved?buildSaved(saved):''}</div>`;
}
function togSch(k,el){schToggles[k]=!schToggles[k];el.classList.toggle('on');el.querySelector('.tog-k').style.left=schToggles[k]?'18px':'2px';}
function buildSaved(saved){const keys=Object.keys(saved.schemas);if(!keys.length)return'';const dt=new Date(saved.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return`<div><p class="sec-title" style="margin-bottom:10px;">Last generated · ${dt}</p>${buildBlocks(saved.schemas,'s')}</div>`;}
function buildBlocks(schemas,prefix){const keys=Object.keys(schemas);if(!keys.length)return'';return`<div class="stabs" id="stabs_${prefix}">${keys.map((k,i)=>`<button class="stab ${i===0?'active':''}" onclick="switchStab('${prefix}',${i},this)">${k}</button>`).join('')}</div>${keys.map((k,i)=>`<div id="stab_${prefix}_${i}" style="display:${i===0?'block':'none'};"><div class="code-wrap"><textarea class="code-box" readonly rows="12">${esc(schemas[k])}</textarea><button class="copy-btn" onclick="cpCode('stab_${prefix}_${i}')">Copy</button></div></div>`).join('')}`;}
function switchStab(prefix,idx,btn){const te=document.getElementById('stabs_'+prefix);if(te)te.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');for(let j=0;j<8;j++){const e=document.getElementById(`stab_${prefix}_${j}`);if(e)e.style.display=j===idx?'block':'none';}}
function cpCode(blockId){const el=document.querySelector(`#${blockId} textarea`);if(!el)return;navigator.clipboard.writeText(el.value).catch(()=>{el.select();document.execCommand('copy');});}

async function genSchema(){
  const scans=DB.scans[AC]||[];if(!scans.length)return;
  const enabled=Object.keys(schToggles).filter(k=>schToggles[k]);
  if(!enabled.length){alert('Enable at least one schema type.');return;}
  const lat=scans[scans.length-1];
  const missed=lat.results.filter(r=>!r.cited).map(r=>r.query);
  const fkw=[...new Set(lat.results.flatMap(r=>r.keywords_found||[]).map(k=>k.toLowerCase()))];
  const mkw=(lat.keywords||[]).filter(k=>!fkw.some(f=>f.includes(k.toLowerCase())||k.toLowerCase().includes(f)));
  const cr=lat.results.length>0?Math.round((lat.results.filter(r=>r.cited).length/lat.results.length)*100):0;
  const c=DB.clients[AC]||{},rev=DB.reviews[AC];
  const revPhrases=(rev?.analysis?.positive_phrases||[]).slice(0,5).map(p=>p.phrase);
  const revKW=rev?.analysis?.schema_keywords||[];
  const allKW=[...new Set([...(lat.keywords||[]),...revKW])];
  const revFAQs=rev?.analysis?.faq_suggestions||[];
  const allRevs=[...(rev?.google?.reviews||[]),...(rev?.yelp?.reviews||[])];
  const avgRating=allRevs.length>0?(allRevs.reduce((s,r)=>s+r.stars,0)/allRevs.length).toFixed(1):'4.5';
  const totRevs=(rev?.google?.total||0)+(rev?.yelp?.total||0)||allRevs.length;
  document.getElementById('schemaOut').innerHTML=`<div class="thinking"><div class="spinner"></div>Generating ${enabled.length} schema type${enabled.length>1?'s':''}${revPhrases.length>0?' with review intelligence':''}...</div>`;
  document.getElementById('genBtn').disabled=true;
  try{
    const schemas={};
    const tl={restaurant:'Restaurant',faqpage:'FAQPage',localbusiness:'LocalBusiness',menu:'Menu',breadcrumb:'BreadcrumbList'};
    for(const type of enabled){const code=await genType(c.name,type,c.location,allKW,missed,mkw,cr,revPhrases,revFAQs,avgRating,totRevs);if(code)schemas[tl[type]]=code;}
    DB.schemas[AC]={timestamp:Date.now(),schemas};await save();
    const imps=[];
    if(enabled.includes('faqpage')&&missed.length>0)imps.push({t:`${missed.length} uncited quer${missed.length>1?'ies':'y'} → FAQ entries`,d:'Each becomes a Q&A that AI surfaces directly'});
    if(revPhrases.length>0)imps.push({t:'Review phrases injected into descriptions',d:`"${revPhrases[0]}" — exact language AI models pull`});
    if(totRevs>0)imps.push({t:`AggregateRating: ${avgRating} from ${totRevs} reviews`,d:'Structured social proof boosts citation confidence'});
    document.getElementById('schemaOut').innerHTML=`<div style="margin-top:12px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><p class="sec-title" style="margin:0;">Generated schema</p><span style="font-size:11px;color:var(--green);font-family:var(--mono);font-weight:500;">${Object.keys(schemas).length} blocks ready</span></div>${imps.length>0?`<div class="pbox" style="margin-bottom:12px;">${imps.map(i=>`<div class="imp-item"><div class="imp-dot"></div><div><div class="imp-title">${i.t}</div><div class="imp-desc">${i.d}</div></div></div>`).join('')}</div>`:''} ${buildBlocks(schemas,'g')}<div class="btn-row"><button class="abtn primary" onclick="alert('Copy the schema above and paste it into a script tag in your site head.')">Deploy to site ↗</button><button class="abtn" onclick="nav('scan',document.querySelector('[data-panel=scan]'))">Re-scan to verify ↗</button></div></div>`;
  }catch(e){document.getElementById('schemaOut').innerHTML=`<div class="pbox"><p style="font-size:12px;color:var(--red);">Error: ${e.message}</p></div>`;}
  document.getElementById('genBtn').disabled=false;document.getElementById('genBtn').textContent='Regenerate schema';
}
async function genType(name,type,loc,kws,missed,mkw,cr,revPhrases,revFAQs,avgRating,totRevs){
  const ps=revPhrases.length>0?`\nInject these exact review phrases: ${revPhrases.join(', ')}`:'';
  const rs=totRevs>0?`\naggregateRating: ratingValue ${avgRating}, reviewCount ${totRevs}`:'';
  const prompts={restaurant:`JSON-LD Restaurant schema for "${name}" in ${loc}.\nInclude @context, @type, name, description (keywords: ${kws.join(', ')}), address, telephone, url, servesCuisine, priceRange, openingHours, aggregateRating.${ps}${rs}\nCitation rate is ${cr}% — make description rich and keyword-dense.\nReturn ONLY valid JSON-LD.`,faqpage:`JSON-LD FAQPage for "${name}" in ${loc}.\nFAQ entries for each uncited query:\n${missed.map((q,i)=>`${i+1}. "${q}"`).join('\n')}\nAlso for: ${mkw.join(', ')}.${revFAQs.length>0?'\nIncorporate:\n'+revFAQs.map(f=>`Q: ${f.question}\nA: ${f.answer}`).join('\n'):''}\nEvery answer must naturally mention "${name}". Return ONLY valid JSON-LD FAQPage.`,localbusiness:`JSON-LD LocalBusiness for "${name}" in ${loc}.\n@type [LocalBusiness,Restaurant,FoodEstablishment], full PostalAddress, geo, telephone, url, openingHoursSpecification, paymentAccepted, priceRange, amenityFeature, areaServed.${rs}\nReturn ONLY valid JSON-LD.`,menu:`JSON-LD Menu for "${name}" in ${loc}.\n3 sections, 3-4 items each with MenuSection/MenuItem, name, description, offers with price.${ps}\nReturn ONLY valid JSON-LD.`,breadcrumb:`JSON-LD BreadcrumbList for "${name}" website.\nHome, Menu, Reservations, About, Contact.\nReturn ONLY valid JSON-LD.`};
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompts[type]}]})});
  const d=await res.json();if(d.error)throw new Error(d.error.message);
  let t=d.content.map(b=>b.text||'').join('').trim().replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/```\s*$/,'').trim();
  try{return JSON.stringify(JSON.parse(t),null,2);}catch(e){return t;}
}

}
async function addClient(){
  const name=document.getElementById('newName').value.trim();if(!name){alert('Enter a name.');return;}
  DB.clients[name]={name,cuisine:document.getElementById('newCuisine').value.trim(),location:document.getElementById('newLoc').value.trim(),keywords:document.getElementById('newKW').value.trim()};
  if(!AC)AC=name;await save();renderSidebarClients();renderSettings();
}
async function delClient(name){
  if(!confirm(`Delete ${name} and all data?`))return;
  ['clients','scans','schemas','reviews'].forEach(k=>{delete DB[k][name];});
  if(AC===name)AC=Object.keys(DB.clients)[0]||null;
  await save();renderSidebarClients();renderSettings();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
